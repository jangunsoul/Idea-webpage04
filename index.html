<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>사칙연산 슬라임 퍼즐 – Stages (No‑Build)</title>
    <!-- Tailwind CDN for quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { height: 100%; }
      body { font-feature-settings: "tnum" on, "lnum" on; }
      @keyframes slimePulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      .slime {
        backdrop-filter: blur(2px);
        animation: slimePulse 1.5s ease-in-out infinite;
      }
    </style>
    <!-- React 18 UMD + Babel (JSX without build) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      // ------------------------------
      // Difficulty / Stage config
      // ------------------------------
      const MAX_STAGE = 100;
      function stageConfig(stage) {
        // Map stage -> size (3..6) and operator set progression
        // Size curve: 1-10:3x3, 11-40:4x4, 41-70:5x5, 71-100:6x6
        let size = 3;
        if (stage >= 11) size = 4;
        if (stage >= 41) size = 5;
        if (stage >= 71) size = 6;

        // Operator curve: 1-25: [+], 26-50: [+, -], 51-75: [+, -, ×], 76-100: [+, -, ×, ÷]
        let ops = ["+"];
        if (stage >= 26) ops = ["+", "-"];
        if (stage >= 51) ops = ["+", "-", "×"];
        if (stage >= 76) ops = ["+", "-", "×", "÷"];

        return { size, ops };
      }

      // ------------------------------
      // Utilities
      // ------------------------------
      function clampInt(n, maxAbs = 9999) {
        if (n > maxAbs) return maxAbs;
        if (n < -maxAbs) return -maxAbs;
        return Math.trunc(n);
      }
      function randInt(min, max, rng=Math.random) {
        return Math.floor(rng() * (max - min + 1)) + min;
      }
      function shuffle(arr, rng=Math.random) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(rng() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      function neighbors([r, c], size) {
        const cand = [ [r-1,c], [r+1,c], [r,c-1], [r,c+1] ];
        return cand.filter(([rr, cc]) => rr>=0 && rr<size && cc>=0 && cc<size);
      }
      const posKey = ([r,c]) => `${r},${c}`;

      function seededRandom(seedStr) {
        if (!seedStr) return Math.random;
        let x = 0x9e3779b9;
        for (let i=0;i<seedStr.length;i++) x ^= seedStr.charCodeAt(i) << (i%16);
        return function () {
          x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
          return ((x>>>0)%1_000_000)/1_000_000;
        };
      }

      // ------------------------------
      // Core math
      // ------------------------------
      function applyOp(value, opSym, k) {
        switch (opSym) {
          case "+": return clampInt(value + k);
          case "-": return clampInt(value - k);
          case "×": return clampInt(value * k);
          case "÷":
            if (k === 0) return value; // avoid
            if (value % k !== 0) return null; // prevent fractions
            return clampInt(value / k);
          default: return value;
        }
      }

      // ------------------------------
      // Level generator (respects size & allowed ops)
      // ------------------------------
      function genSolvableLevel({ size, ops, seed }) {
        const rng = seededRandom(seed);
        const rint = (a,b)=>randInt(a,b,rng);

        // 1) choose start & goal
        const start = [rint(0,size-1), rint(0,size-1)];
        let goal;
        do { goal = [rint(0,size-1), rint(0,size-1)]; } while (posKey(goal)===posKey(start));

        // 2) random self-avoiding path
        let path = [start];
        const visited = new Set([posKey(start)]);
        const MAX_ATTEMPTS = 4000;
        let attempts = 0;
        while (posKey(path[path.length-1])!==posKey(goal) && attempts<MAX_ATTEMPTS) {
          attempts++;
          const here = path[path.length-1];
          const ns = shuffle(neighbors(here,size), rng).filter(p=>!visited.has(posKey(p)));
          if (!ns.length) {
            if (path.length<=1) { path=[start]; visited.clear(); visited.add(posKey(start)); }
            else { visited.delete(posKey(path.pop())); }
            continue;
          }
          ns.sort((a,b)=>{
            const da=Math.abs(a[0]-goal[0])+Math.abs(a[1]-goal[1]);
            const db=Math.abs(b[0]-goal[0])+Math.abs(b[1]-goal[1]);
            return da-db + (rng()-0.5);
          });
          const nxt = ns[0];
          path.push(nxt); visited.add(posKey(nxt));
          if (path.length > size*size*2) break;
        }
        if (posKey(path[path.length-1])!==posKey(goal)) {
          // fallback: direct Manhattan
          path = [start];
          let cur=[...start];
          while (cur[0]!==goal[0]) { cur=[cur[0]+Math.sign(goal[0]-cur[0]),cur[1]]; path.push(cur); }
          while (cur[1]!==goal[1]) { cur=[cur[0],cur[1]+Math.sign(goal[1]-cur[1])]; path.push(cur); }
        }

        // 3) choose start value & operations along the path
        const startValue = rint(3, 9); // gentler start for early stages
        let curVal = startValue;
        const opsOnPath = {};

        const pickK = (op) => {
          if (op === "+") return rint(1, 5);
          if (op === "-") return rint(1, 5);
          if (op === "×") return rint(2, 3);
          if (op === "÷") return [2,3].filter(d=>curVal%d===0)[rint(0,1)] ?? 2;
          return 1;
        };

        for (let i=1;i<path.length-1;i++) {
          const key = posKey(path[i]);
          let assigned=false, chosenOp=null, k=1;
          const tryOrder = shuffle(ops, rng);
          for (const op of tryOrder) {
            k = pickK(op);
            const v = applyOp(curVal, op, k);
            if (v!==null && Math.abs(v)<=9999) { chosenOp=op; curVal=v; assigned=true; break; }
          }
          if (!assigned) { chosenOp = "+"; k=1; curVal = applyOp(curVal, "+", 1); }
          opsOnPath[key] = { op: chosenOp, k };
        }

        const targetValue = curVal;
        const maxSteps = path.length-1;

        // 4) build board
        const board = Array.from({length:size}, ()=>Array.from({length:size}, ()=>({op:"+",k:1})));
        for (let i=1;i<path.length-1;i++) {
          const [r,c] = path[i];
          const {op,k} = opsOnPath[posKey([r,c])];
          board[r][c] = { op, k };
        }
        // distractors
        for (let r=0;r<size;r++) for (let c=0;c<size;c++) {
          const key = posKey([r,c]);
          if (key in opsOnPath || posKey([r,c])===posKey(start) || posKey([r,c])===posKey(goal)) continue;
          const op = ops[randInt(0, ops.length-1, rng)];
          let k = (op==="×"||op==="÷") ? rint(2,3) : rint(1,5);
          if (op==="÷") k = [2,3][randInt(0,1,rng)];
          board[r][c] = { op, k };
        }

        return { size, start, goal, startValue, targetValue, maxSteps, board, path };
      }

      // ------------------------------
      // UI Tiles: floor (op text) + slime overlay at current position
      // ------------------------------
      function Tile({ isStart, isGoal, isCurrent, data, onClick, targetValue }) {
        return (
          <div
            onClick={onClick}
            className={[
              "relative w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border grid place-items-center select-none",
              isStart ? "bg-emerald-50 border-emerald-300" :
              isGoal ? "bg-amber-50 border-amber-300" :
              "bg-white border-slate-300 hover:shadow-md transition-all"
            ].join(" ")}
            role="button"
            aria-label={isStart?"START":isGoal?"GOAL":`${data.op}${data.k}`}
            title={isStart?"START":isGoal?"GOAL":`${data.op}${data.k}`}
          >
            {/* Floor label */}
            <div className="text-base sm:text-lg font-bold text-slate-700 pointer-events-none flex flex-col items-center leading-none">
              {isStart ? "START" : isGoal ? <>
                <span>GOAL</span>
                <span className="text-xs sm:text-sm text-amber-600">{targetValue}</span>
              </> : <>{data.op}{data.k}</>}
            </div>
            {/* Slime overlay (only on current) */}
            {isCurrent && (
              <div className="absolute inset-0 flex items-center justify-center">
                <div className="slime w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-emerald-400/40 border-2 border-emerald-400 shadow-inner grid place-items-center">
                  <span className="font-black text-slate-800 text-lg">{/* number injected by parent */}</span>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ------------------------------
      // Main Component with Stage Progression
      // ------------------------------
      function Game() {
        const [stage, setStage] = useState(() => {
          const cleared = Number(localStorage.getItem("arith_cleared")||"0");
          return Math.min(cleared+1 || 1, MAX_STAGE);
        });
        const { size, ops } = stageConfig(stage);

        // use stage as seed to ensure fairness when sharing
        const seed = `stg_${stage}`;
        const [level, setLevel] = useState(()=>genSolvableLevel({ size, ops, seed }));
        const [pos, setPos] = useState(level.start);
        const [value, setValue] = useState(level.startValue);
        const [moves, setMoves] = useState(0);
        const [history, setHistory] = useState([]);
        const [won, setWon] = useState(false);
        const [lost, setLost] = useState(false);

        // speedrun timer
        const [startTs, setStartTs] = useState(null);
        const [elapsed, setElapsed] = useState(0);
        useEffect(()=>{
          if (!startTs || won || lost) return;
          const id = setInterval(()=>setElapsed(Date.now()-startTs), 16);
          return ()=>clearInterval(id);
        }, [startTs, won, lost]);

        const canStepTo = (r,c)=>{
          const [rr,cc]=pos; return Math.abs(r-rr)+Math.abs(c-cc)===1;
        };

        const [toast, setToast] = useState("");
        const tRef = useRef(null);
        const flash = (msg) => { setToast(msg); clearTimeout(tRef.current); tRef.current = setTimeout(()=>setToast(""),1500); };

        const resetLevel = ()=>{
          const lv = genSolvableLevel({ size, ops, seed });
          setLevel(lv); setPos(lv.start); setValue(lv.startValue);
          setMoves(0); setHistory([]); setWon(false); setLost(false); setStartTs(null); setElapsed(0);
        };

        const step = (r,c)=>{
          if (won||lost) return;
          if (!canStepTo(r,c)) return;
          if (!startTs) setStartTs(Date.now());
          const isGoal = posKey([r,c])===posKey(level.goal);
          const data = level.board[r][c];
          const newVal = isGoal ? value : applyOp(value, data.op, data.k);
          if (!isGoal && newVal===null) { flash("😵 나눗셈이 딱 나누어떨어지지 않아요!"); return; }
          setHistory(h=>[...h,{pos,value}]);
          setPos([r,c]);
          setMoves(m=>m+1);
          setValue(isGoal?value:newVal);
          if (isGoal) {
            if (value===level.targetValue) {
              setWon(true);
              // update progression
              const cleared = Number(localStorage.getItem("arith_cleared")||"0");
              if (stage>cleared) localStorage.setItem("arith_cleared", String(stage));
              flash("🎉 스테이지 클리어!");
            } else {
              setLost(true); flash(`❌ 목표(${level.targetValue})와 값(${value})이 달라요.`);
            }
          }
        };

        // keyboard controls
        useEffect(()=>{
          const onKey=(e)=>{
            const [r,c]=pos;
            if (["ArrowUp","KeyW"].includes(e.code)) step(Math.max(0,r-1), c);
            else if (["ArrowDown","KeyS"].includes(e.code)) step(Math.min(level.size-1,r+1), c);
            else if (["ArrowLeft","KeyA"].includes(e.code)) step(r, Math.max(0,c-1));
            else if (["ArrowRight","KeyD"].includes(e.code)) step(r, Math.min(level.size-1,c+1));
            else if (e.code==="KeyR") resetLevel();
            else if (e.code==="Enter" && won) nextStage();
          };
          window.addEventListener("keydown", onKey);
          return ()=>window.removeEventListener("keydown", onKey);
        }, [pos, level, won, lost]);

        const progress = Math.min(100, Math.round((moves/level.maxSteps)*100));

        const nextStage = ()=>{
          if (stage < MAX_STAGE) setStage(s=>s+1);
        };
        // when stage changes, regenerate level
        useEffect(()=>{
          const { size, ops } = stageConfig(stage);
          const seed = `stg_${stage}`;
          const lv = genSolvableLevel({ size, ops, seed });
          setLevel(lv); setPos(lv.start); setValue(lv.startValue);
          setMoves(0); setHistory([]); setWon(false); setLost(false); setStartTs(null); setElapsed(0);
        }, [stage]);

        return (
          <div className="min-h-screen w-full text-slate-800 flex items-center justify-center p-4">
            <div className="w-full max-w-4xl">
              <header className="mb-4 flex items-end justify-between gap-4">
                <div>
                  <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight">사칙연산 슬라임 퍼즐</h1>
                  <p className="text-sm text-slate-500 mt-1">화살표/WASD 이동 · R 리셋 · (클리어 후) Enter 다음 스테이지</p>
                </div>
                <div className="text-right">
                  <div className="text-sm font-medium">Stage <span className="font-bold">{stage}</span>/<span>{MAX_STAGE}</span></div>
                  <div className="text-xs text-slate-500">맵 {level.size}×{level.size} · 연산: {stageConfig(stage).ops.join(" ")}</div>
                </div>
              </header>

              <section className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div className="bg-white rounded-2xl p-4 shadow-sm border">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-sm text-slate-500">현재 값</span>
                    <span className="text-2xl font-black tabular-nums">{value}</span>
                  </div>
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-sm text-slate-500">목표 숫자</span>
                    <span className="text-2xl font-black tabular-nums text-amber-600">{level.targetValue}</span>
                  </div>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm text-slate-500">남은 이동</span>
                    <span className="text-lg font-bold tabular-nums">{Math.max(0, level.maxSteps - moves)}</span>
                  </div>
                  <div className="flex items-center justify-between mb-4">
                    <span className="text-sm text-slate-500">경과 시간</span>
                    <span className="text-lg font-bold tabular-nums">{(won||lost)? (startTs? (Date.now()-startTs):0) : elapsed} ms</span>
                  </div>
                  <div className="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div className="h-full bg-emerald-400" style={{ width: `${progress}%` }} />
                  </div>

                  <div className="mt-4 flex flex-wrap gap-2">
                    <button onClick={resetLevel} className="px-3 py-2 rounded-xl border shadow-sm hover:shadow bg-white">스테이지 리셋</button>
                    {won && <button onClick={nextStage} className="px-3 py-2 rounded-xl border shadow-sm hover:shadow bg-emerald-50">다음 스테이지 ▶</button>}
                  </div>

                  {won && <div className="mt-3 text-sm font-semibold text-emerald-600">정답! 스테이지를 클리어했습니다. Enter를 눌러 다음 스테이지로 진행할 수 있어요.</div>}
                  {lost && <div className="mt-3 text-sm font-semibold text-rose-600">실패! 다시 도전해 보세요.</div>}
                </div>

                <div className="bg-white rounded-2xl p-4 shadow-sm border">
                  <div className={`grid gap-2 place-items-center`} style={{ gridTemplateColumns: `repeat(${level.size}, minmax(0, 1fr))` }}>
                    {level.board.map((row, r) =>
                      row.map((cell, c) => {
                        const isStart = posKey([r,c])===posKey(level.start);
                        const isGoal  = posKey([r,c])===posKey(level.goal);
                        const isCurrent = posKey([r,c])===posKey(pos);
                        return (
                          <div key={`${r}-${c}`} className="relative">
                            <Tile
                              isStart={isStart}
                              isGoal={isGoal}
                              isCurrent={isCurrent}
                              targetValue={level.targetValue}
                              data={cell}
                              onClick={()=>step(r,c)}
                            />
                            {/* inject current value text into slime if current */}
                            {isCurrent && (
                              <div className="pointer-events-none absolute inset-0 flex items-center justify-center">
                                <span className="font-black text-slate-900 text-lg">{value}</span>
                              </div>
                            )}
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              </section>

              {!!toast && (
                <div className="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm px-4 py-2 rounded-xl shadow-lg">
                  {toast}
                </div>
              )}

              <footer className="mt-6 text-xs text-slate-500 space-y-1">
                <p>규칙: <strong>START</strong>에서 시작해 상하좌우로 이동합니다. 이동한 칸의 바닥에 적힌 연산(<em>+n, -n, ×n, ÷n</em>)이 현재 값에 즉시 적용됩니다. <strong>GOAL</strong>에 도착했을 때 값이 <strong>목표 숫자</strong>와 일치하면 클리어! 클리어하면 다음 스테이지로 자동 진행할 수 있습니다.</p>
                <p>그래픽: 캐릭터(슬라임)는 반투명 원형으로 표시되며, 슬라임 위에 현재 값이 떠 있습니다. 각 칸 바닥에는 연산과 수치가 표기됩니다.</p>
              </footer>
            </div>
          </div>
        );
      }

      // ------------------------------
      // Lightweight Unit Tests (console)
      // ------------------------------
      function assert(name, cond) { if (!cond) console.error(`❌ [TEST FAIL] ${name}`); else console.log(`✅ [TEST PASS] ${name}`); }
      function runUnitTests() {
        try {
          // applyOp tests (unchanged and required)
          assert("applyOp +", applyOp(5, "+", 3) === 8);
          assert("applyOp -", applyOp(5, "-", 7) === -2);
          assert("applyOp ×", applyOp(6, "×", 4) === 24);
          assert("applyOp ÷ integer", applyOp(12, "÷", 3) === 4);
          assert("applyOp ÷ non-integer -> null", applyOp(10, "÷", 3) === null);
          assert("applyOp ÷ by 0 returns same", applyOp(10, "÷", 0) === 10);

          // generator invariants for multiple stage tiers
          const tiers = [1, 26, 51, 76, 100];
          for (const st of tiers) {
            const { size, ops } = stageConfig(st);
            const lv = genSolvableLevel({ size, ops, seed: `test_${st}` });
            assert(`stage ${st}: start!=goal`, posKey(lv.start)!==posKey(lv.goal));
            assert(`stage ${st}: steps ok`, lv.maxSteps===lv.path.length-1);
            // recompute along path
            let v = lv.startValue;
            for (let i=1;i<lv.path.length-1;i++) {
              const [r,c] = lv.path[i];
              const cell = lv.board[r][c];
              v = applyOp(v, cell.op, cell.k);
              assert(`stage ${st}: step ${i} valid`, v!==null);
            }
            assert(`stage ${st}: recomputed==target`, v===lv.targetValue);
          }
          console.log("\nAll tests completed.\n");
        } catch (err) { console.error("❌ [TEST ERROR]", err); }
      }

      // Render & test
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Game />);
      if (!window.__ARITH_SLIME_TESTED__) { window.__ARITH_SLIME_TESTED__=true; runUnitTests(); }
    </script>
  </body>
</html>
